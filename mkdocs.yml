# information

site_name: Commons Library Documentation
site_url: https://docs.alex8obrien.com
site_author: Alex O'Brien
site_description: >
  Documentation for my C# Commons Library.

# Repository

repo_name: alex8obrien/CommonsLibrary
repo_url: https://github.com/alex8obrien/CommonsLibrary

# Copyright

copyright: Copyright &copy; 2023 Alex O'Brien

# Theme Configuration

theme:
  name: material
  features:
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: slate 
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: blue
      accent: indigo
    - media: "(prefers-color-scheme: dark)"
      scheme: light
      toggle:
        icon: material/toggle-switch-off-outline 
        name: Switch to dark mode
      primary: blue
      accent: indigo
  favicon: assets/favicon.png
  icon: 
    logo: fontawesome/solid/book

# Plugins

plugins:
  - git-revision-date-localized:
      enable_creation_date: true

# Additional configuration

extra:
  homepage: https://docs.alex8obrien.com
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alex8obrien/
    - icon: fontawesome/brands/twitter
      link: https://twitter.com/alex8obrien/
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/alex8obrien/
  analytics: 
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >- 
            Thanks for your feedback!

# Extensions
markdown_extensions:
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: false
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      social_url_shorthand: true
      provider: github
      user: alex8obrien
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# Additional JavaScript files

extra_javascript:
  - javascripts/feedback.js
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

# Navigation

nav:
  - Home:
    - index.md
    - test.md